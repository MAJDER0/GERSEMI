version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - gersemi-network

  api:
    build:
      context: .
      dockerfile: Presentation/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=GersemiDb;User Id=sa;Password=${SA_PASSWORD};
    depends_on:
      - db
    networks:
      - gersemi-network

  client:
    build:
      context: ../GERSEMI.Client
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
    volumes:
      - ../GERSEMI.Client:/app
      - /app/node_modules
    networks:
      - gersemi-network

volumes:
  mssql-data:

networks:
  gersemi-network:
    driver: bridge

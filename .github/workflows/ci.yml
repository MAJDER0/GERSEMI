name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'

    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"

    - name: Publish Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: TestResults
        path: '**/TestResults/*.trx'

  build-and-push-docker-images:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and push API image
      uses: docker/build-push-action@v3
      with:
        context: .
        file: Presentation/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gersemi-api:${{ github.ref_name }}

    - name: Build and push Client image
      uses: docker/build-push-action@v3
      with:
        context: ./GERSEMI.Client
        file: Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gersemi-client:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-docker-images
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Hosting Platform
      # Add your deployment steps here
      run: echo "Deploying application..."
